<!DOCTYPE html>
<html>
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <link href="style.css" rel="stylesheet" type="text/css" />
        <style>
            /* CSS */
            * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            }

            body {
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                background: #fff;
                border-radius: 10px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
                max-width: 500px;
                width: 100%;
                overflow: hidden;
            }

            header {
                background: #4a5568;
                color: #fff;
                padding: 20px;
                text-align: center;
            }

            h1 {
                font-size: 24px;
                margin-bottom: 5px;
            }

            .subtitle {
                font-size: 14px;
                opacity: 0.8;
            }

            .todo-app {
                padding: 20px;
            }

            .input-section {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }

            #todo-input {
                flex: 1;
                padding: 12px;
                border: 2px solid #e2e8f0;
                border-radius: 6px;
                font-size: 16px;
            }

            #todo-input:focus {
                border-color: #667eea;
                outline: none;
            }

            #add-btn {
                background: #667eea;
                color: #fff;
                border: none;
                border-radius: 6px;
                padding: 12px 20px;
                cursor: pointer;
            }

            #add-btn:hover {
                background: #5a6fd8;
            }

            .filters {
                display: flex;
                gap: 10px;
                margin-bottom: 20px;
            }

            .filter-btn {
                flex: 1;
                padding: 8px;
                border-radius: 6px;
                border: none;
                cursor: pointer;
            }

            .filter-btn.active {
                background: #667eea;
                color: #fff;
            }

            .todo-stats {
                display: flex;
                justify-content: space-between;
                margin-bottom: 15px;
                padding: 10px;
                font-size: 14px;
            }

            .todo-list {
                list-style: none;
            }

            .todo-item {
                display: flex;
                align-items: flex-start;
                padding: 15px;
                border-radius: 6px;
                margin-bottom: 10px;
                border-left: 4px solid #667eea;
                gap: 10px;
            }

            .todo-item.completed {
                opacity: 0.7;
                border-left-color: #48bb78;
            }

            .todo-item.completed .todo-text {
                text-decoration: line-through;
            }

            .todo-checkbox {
                margin-right: 12px;
                transform: scale(1.2);
            }

            .todo-text {
                flex: 1;
                font-size: 16px;
                min-width: 0;
                word-break: break-word;
                overflow-wrap: anywhere;
            }

            .delete-btn {
                border: none;
                border-radius: 4px;
                padding: 6px 12px;
                cursor: pointer;
            }

            .delete-btn:hover {
                opacity: 0.8;
            }

            .empty-state {
                text-align: center;
                padding: 40px 20px;
            }

            .empty-icon {
                font-size: 48px;
                margin-bottom: 10px;
            }
        </style>

        <title>Title</title>
    </head>
    <body>
        <!-- HTML -->
        <div class="container">
        <header>
            <h1>To-Do List</h1>
            <p class="subtitle">One thing at a time, get things done</p>
        </header>

            <div class="todo-app">
                <div class="input-section">
                    <input
                        type="text"
                        id="todo-input"
                        placeholder="What quest are you going on?"
                    >
                    <button id="add-btn">Add Task</button>
                </div>

                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>

                <div class="todo-stats">
                    <span id="total-tasks">Total: 0</span>
                    <span id="completed-tasks">Completed: 0</span>
                    <span id="remaining-tasks">Remaining: 0</span>
                </div>

                <ul class="todo-list" id="todo-list">
                    <div class="empty-state">
                        <div class="empty-icon">📝</div>
                        <p>No tasks yet</p>
                    </div>
                </ul>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <!-- <script src="script.js"></script> -->
        <script>
            // JS
            document.addEventListener('DOMContentLoaded', function () {
                // selecting elements
                const todoInput = document.getElementById('todo-input');
                const addBtn = document.getElementById('add-btn');
                const todoList = document.getElementById('todo-list');
                const filterBtns = document.querySelectorAll('.filter-btn');
                const totalTasks = document.getElementById('total-tasks');
                const completedTasks = document.getElementById('completed-tasks');
                const remainingTasks = document.getElementById('remaining-tasks');

                // React state
                let todos = JSON.parse(localStorage.getItem('todos')) || [];
                let inputText = '';
                let currentFilter = 'all';

                // event listener
                todoInput.addEventListener('input', function (e) {
                    // React updating state
                    inputText = e.target.value;
                });

                // Enter to add a task
                addBtn.addEventListener('click', addTodo);

                todoInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        addTodo();
                    }
                });

                // JS event handling
                filterBtns.forEach(function (btn) {
                    btn.addEventListener('click', function () {
                        filterBtns.forEach(function (b) {
                            b.classList.remove('active');
                        });

                        this.classList.add('active');

                        // React updating state
                        currentFilter = this.dataset.filter;

                        // React re-render UI
                        renderTodos();
                    });
                });

                function addTodo() {
                    const text = inputText.trim();
                    if (text) {
                        const todo = {
                            id: Date.now(),
                            text: text,
                            completed: false,
                            createdAt: new Date().toISOString()
                        };

                        // React state update
                        todos = [...todos, todo];

                        inputText = '';
                        todoInput.value = '';

                        // React side effect + re-render
                        saveTodos();
                        renderTodos();
                    }
                }

                function toggleTodo(id) {
                    // React immutable state update
                    todos = todos.map(function (todo) {
                        if (todo.id === id) {
                            return { ...todo, completed: !todo.completed };
                        } else {
                            return todo;
                        }
                    });

                    saveTodos();
                    renderTodos();
                }

                function deleteTodo(id) {
                    // filtering state
                    todos = todos.filter(function (todo) {
                        return todo.id !== id;
                    });

                    saveTodos();
                    renderTodos();
                }

                function saveTodos() {
                    // localStorage
                    localStorage.setItem('todos', JSON.stringify(todos));
                }

                // React derived state
                function getFilteredTodos() {
                    return todos.filter(function (todo) {
                        if (currentFilter === 'active') {
                            return !todo.completed;
                        } else if (currentFilter === 'completed') {
                            return todo.completed;
                        } else {
                            return true;
                        }
                    });
                }

                // React render function
                function renderTodos() {
                    const filteredTodos = getFilteredTodos();

                    if (filteredTodos.length === 0) {
                        todoList.innerHTML =
                            '<div class="empty-state">' +
                            '<div class="empty-icon">📝</div>' +
                            '<p>No tasks yet</p>' +
                            '</div>';
                    } else {
                        todoList.innerHTML = filteredTodos.map(function (todo) {
                            return (
                                '<li class="todo-item ' + (todo.completed ? 'completed' : '') + '">' +
                                    '<input type="checkbox" class="todo-checkbox" ' +
                                    (todo.completed ? 'checked' : '') +
                                    ' onchange="toggleTodo(' + todo.id + ')">' +
                                    '<span class="todo-text">' + todo.text + '</span>' +
                                    '<button class="delete-btn" onclick="deleteTodo(' + todo.id + ')">Delete</button>' +
                                '</li>'
                            );
                        }).join('');
                    }

                    updateStats();
                }

                // calculating values
                function updateStats() {
                    const total = todos.length;
                    const completed = todos.filter(function (todo) {
                        return todo.completed;
                    }).length;
                    const remaining = total - completed;

                    totalTasks.textContent = 'Total: ' + total;
                    completedTasks.textContent = 'Completed: ' + completed;
                    remainingTasks.textContent = 'Remaining: ' + remaining;
                }

                // global functions
                window.toggleTodo = toggleTodo;
                window.deleteTodo = deleteTodo;

                // React initial render
                renderTodos();
            });
        </script>
    </body>
</html>
