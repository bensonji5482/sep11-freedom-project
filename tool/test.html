<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        header {
            background: #4a5568;
            color: white;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
        }

        .todo-app {
            padding: 20px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #todo-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 16px;
        }

        #todo-input:focus {
            outline: none;
            border-color: #667eea;
        }

        #add-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
        }

        #add-btn:hover {
            background: #5a6fd8;
        }

        .todo-stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 6px;
            font-size: 14px;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .todo-item.completed {
            opacity: 0.7;
            border-left-color: #48bb78;
        }

        .todo-checkbox {
            margin-right: 12px;
            transform: scale(1.2);
        }

        .todo-text {
            flex: 1;
            font-size: 16px;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #718096;
        }

        .delete-btn {
            background: #fc8181;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #f56565;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #718096;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            flex: 1;
            padding: 8px;
            background: #edf2f7;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Simple To-Do List</h1>
            <p class="subtitle">Get things done, one task at a time</p>
        </header>

        <div class="todo-app">
            <div class="input-section">
                <input
                    type="text"
                    id="todo-input"
                    placeholder="What needs to be done?"
                >
                <button id="add-btn">Add Task</button>
            </div>

            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="todo-stats">
                <span id="total-tasks">Total: 0</span>
                <span id="completed-tasks">Completed: 0</span>
                <span id="remaining-tasks">Remaining: 0</span>
            </div>

            <ul class="todo-list" id="todo-list">
                <div class="empty-state">
                    <div class="empty-icon">📝</div>
                    <p>No tasks yet. Add your first task above!</p>
                </div>
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
    <script>
        // Simple JavaScript for functionality
        document.addEventListener('DOMContentLoaded', function() {
            const todoInput = document.getElementById('todo-input');
            const addBtn = document.getElementById('add-btn');
            const todoList = document.getElementById('todo-list');
            const filterBtns = document.querySelectorAll('.filter-btn');
            const totalTasks = document.getElementById('total-tasks');
            const completedTasks = document.getElementById('completed-tasks');
            const remainingTasks = document.getElementById('remaining-tasks');

            let todos = JSON.parse(localStorage.getItem('todos')) || [];
            let currentFilter = 'all';

            // Load todos from localStorage
            renderTodos();

            // Add todo event
            addBtn.addEventListener('click', addTodo);
            todoInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') addTodo();
            });

            // Filter events
            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.filter;
                    renderTodos();
                });
            });

            function addTodo() {
                const text = todoInput.value.trim();
                if (text) {
                    const todo = {
                        id: Date.now(),
                        text: text,
                        completed: false,
                        createdAt: new Date().toISOString()
                    };
                    todos.push(todo);
                    saveTodos();
                    renderTodos();
                    todoInput.value = '';
                    todoInput.focus();
                }
            }

            function toggleTodo(id) {
                todos = todos.map(todo =>
                    todo.id === id ? { ...todo, completed: !todo.completed } : todo
                );
                saveTodos();
                renderTodos();
            }

            function deleteTodo(id) {
                todos = todos.filter(todo => todo.id !== id);
                saveTodos();
                renderTodos();
            }

            function saveTodos() {
                localStorage.setItem('todos', JSON.stringify(todos));
            }

            function renderTodos() {
                const filteredTodos = todos.filter(todo => {
                    if (currentFilter === 'active') return !todo.completed;
                    if (currentFilter === 'completed') return todo.completed;
                    return true;
                });

                if (filteredTodos.length === 0) {
                    todoList.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📝</div>
                            <p>${currentFilter === 'all'
                                ? 'No tasks yet. Add your first task above!'
                                : currentFilter === 'active'
                                    ? 'No active tasks. Great job!'
                                    : 'No completed tasks yet.'}</p>
                        </div>
                    `;
                } else {
                    todoList.innerHTML = filteredTodos.map(todo => `
                        <li class="todo-item ${todo.completed ? 'completed' : ''}">
                            <input
                                type="checkbox"
                                class="todo-checkbox"
                                ${todo.completed ? 'checked' : ''}
                                onchange="toggleTodo(${todo.id})"
                            >
                            <span class="todo-text">${todo.text}</span>
                            <button class="delete-btn" onclick="deleteTodo(${todo.id})">
                                Delete
                            </button>
                        </li>
                    `).join('');
                }

                updateStats();
            }

            function updateStats() {
                const total = todos.length;
                const completed = todos.filter(todo => todo.completed).length;
                const remaining = total - completed;

                totalTasks.textContent = `Total: ${total}`;
                completedTasks.textContent = `Completed: ${completed}`;
                remainingTasks.textContent = `Remaining: ${remaining}`;
            }

            // Make functions global for inline event handlers
            window.toggleTodo = toggleTodo;
            window.deleteTodo = deleteTodo;
        });
    </script>
</body>
</html>
